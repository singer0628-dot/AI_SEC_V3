<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💌 M.Y.G.I.T.P.A.G.E</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #main_title {
        height: 6vw;
        line-height: 6vw;
        font-size: 1.5vw;
        text-align: center;
        background: blue;
        color: whitesmoke;
        margin-bottom: 2vw;
      }
      #desc {
        font-size: 1.5vw;
        margin: 1vw;
      }
      .intro_img {
        width: 5vw;
        height: 5vw;
        border-radius: 1vw;
      }
      #mycontents {
        margin: 1vw;
      }
      .subbox {
        float: left;
      }
      .mbox {
        height: 7vw;
        border: 1px solid gray;
        box-shadow: 2px 2px 2px 2px lightgray;
        padding-top: 0.5vw;
        border-radius: 0.5vw;
      }
    </style>
  </head>
  <body>
    <div id="main_title">
      <h1>정보보안을 위한 AI 모델 구성</h1>
    </div>
    <p id="desc">페이지개요 : AI 딥러닝과 정보보안에 관심이 많아 ....</p>
    <div id="mycontents"></div>
  </body>
  <script>
    //환경
    class unit {
      constructor(img, link, scribe) {
        this.img = img; //이미지링크
        this.link = link; //소스링크
        this.scribe = scribe; //설명
      }
    }
    let box_frame = (unit_obj) => `
    <div class="mbox">
        <div class="subbox" style="width:6vw;height:6vw">
            <p class="intro_img" style="margin:auto"><img class="tit_img" style="wdith:5vw;height:5vw"${unit_obj.img}" /></p>
            <p class="intro_lnk" style="text-align: center;"><a target="_blank" href="${unit_obj.link}">소스링크</a></p>
        </div>
        <div class="subbox" style="width:85vw">
        ${unit_obj.scribe}
        </div>
    </div>
    `;
  </script>
  <script>
    //사용자 수정
    //구글 이미지 링크
    //https://drive.google.com/thumbnail?id=(이미지 아이디)&sz=w600
    // 구글에 이미지 업로드 후에 공유에서 링크복사후 발췌하면 됩니다.
    //https://drive.google.com/file/d/ (이미지 아이디) /view?usp=drive_link
    const crypto = new unit(
      "https://drive.google.com/thumbnail?id=1D-1PKfXEasEyzYeW-4uuEhii9w8UrQ0SKDi=w600", //이미지 링크
      "https://github.com/singer0628-dot/AI_SEC_V3/tree/main/2.%EC%8B%9C%EA%B3%84%EC%97%B4%EB%AA%A8%EB%8D%B8/ai_tools/crypto_coin", //소스링크
      ` 활용방법 : 가상화폐와 주식등의 일별 최고가,현재가,최저가등을 이용하여
            앞으로의 가격을 예측해보는 AI 모델과 서비스로 실시간으로 변화되는
            시계열 데이터를 예측하는 비즈니스에 활용 가치가 있을것으로
            예상된다......`, //설명
    );
    const smith = new unit(
      "https://drive.google.com/thumbnail?id=1S0V1MlXq8Atw1HA2uZG8BObxf3sNDRHm=w600",
      "https://github.com/singer0628-dot/AI_SEC_V3/tree/main/2.%EC%8B%9C%EA%B3%84%EC%97%B4%EB%AA%A8%EB%8D%B8/ai_tools/smithing_anal",
      `활용방법 : 스미싱 문자와 정상문자를 구분하여 확률적으로 판단 예측을 표기하는 AI 모델로
         한국어 단어 인식부문의 NLP 분야의 분류방식 비즈니스에 활용 가치가 있다.
         `,
    );
    const mydatas = [crypto, smith];
    let inHtml = "";
    for (let unit of mydatas) {
      inHtml += box_frame(unit);
    }
    const mycontents = document.getElementById("mycontents");
    mycontents.innerHTML = inHtml;
    const imgs = document.getElementsByClassName("tit_img");
    for (const it of imgs) {
      it.addEventListener("mouseover", function () {
        this.style.position = "absolute";
        this.style.zIndex = "1";
        this.style.width = "25vw";
        this.style.height = "25vw";
      });
      it.addEventListener("mouseout", function () {
        this.style.position = "static";
        this.style.width = "5vw";
        this.style.height = "5vw";
      });
    }
  </script>
</html>
